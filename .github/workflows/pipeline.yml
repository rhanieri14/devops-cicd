name: Pipeline CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configura Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build e testes com Maven
        run: mvn test
        working-directory: minha-app

      - name: Gera o JAR
        run: mvn package -DskipTests
        working-directory: minha-app

      - name: Build concluído
        run: echo "JAR gerado com sucesso!"